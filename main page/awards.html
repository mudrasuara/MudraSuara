<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Awards</title>
  <link rel="stylesheet" href="awards.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <a href="main.html" class="icon icon-1">🏠</a>

    <div class="icon-group">
      <a href="main.html" class="icon">📚</a>
      <a href="badge.html" class="icon">🏆</a>
      <a href="profile.html" class="icon">👤</a>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <div class="header">
      <div class="stats">
        <div class="stat">🔥 1</div>
        <div class="stat">🏆 100 points</div>
      </div>
    </div>

    <!-- AWARDS SECTION -->
    <div class="awards-section">

      <!-- TITLE -->
      <div class="title">
        <h1>Awards</h1>
      </div>

      <!-- CONTENT -->
      <div class="content">

        <!-- BADGES -->
        <div class="badges">

          <div class="badge active" data-title="Bronze" data-desc="First milestone unlocked">
            <div class="circle bronze"></div>
            <p>Bronze</p>
            <p class="desc">First milestone unlocked</p>
          </div>

          <div class="badge" data-title="Silver" data-desc="Keep improving your streak">
            <div class="circle silver"></div>
            <p>Silver</p>
            <p class="desc">Keep improving your streak</p>
          </div>

          <div class="badge" data-title="Gold" data-desc="High performance level">
            <div class="circle gold"></div>
            <p>Gold</p>
            <p class="desc">High performance level</p>
          </div>

          <div class="badge" data-title="Diamond" data-desc="Elite mastery achieved">
            <div class="circle diamond"></div>
            <p>Diamond</p>
            <p class="desc">Elite mastery achieved</p>
          </div>

        </div>

        <!-- POPUP -->
        <div class="popup hidden">

          <span class="close">✕</span>

          <div class="circle large bronze" id="popupCircle"></div>

          <h2 id="popupTitle">Bronze</h2>
          <p id="popupDesc">Selamat! Kamu berhasil mendapatkan bronze!</p>

          <button>Download</button>

        </div>

      </div>

    </div>

  </main>

</div>

<!-- ================= JS ================= -->
<script>
  const badges = document.querySelectorAll(".badge");

  const popup = document.querySelector(".popup");
  const popupTitle = document.getElementById("popupTitle");
  const popupDesc = document.getElementById("popupDesc");
  const popupCircle = document.getElementById("popupCircle");

  const closeBtn = document.querySelector(".popup .close");

  // OPEN POPUP + UPDATE CONTENT
  badges.forEach(badge => {
    badge.addEventListener("click", () => {

      // active state
      badges.forEach(b => b.classList.remove("active"));
      badge.classList.add("active");

      // update text
      const title = badge.dataset.title;
      const desc = badge.dataset.desc;

      popupTitle.textContent = title;
      popupDesc.textContent = desc;

      // update circle color
      popupCircle.className = "circle large " + title.toLowerCase();

      // show popup
      popup.classList.remove("hidden");
    });
  });

  // CLOSE POPUP
  closeBtn.addEventListener("click", () => {
    popup.classList.add("hidden");
  });
</script>

</body>
</html>
