<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>review lesson</title>
  <link rel="stylesheet" href="review lesson.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

  <!-- CLOSE (X) -->
  <a href="points.html" class="close-btn">✕</a>

  <script>
  function goToPoints() {
    window.location.href = "points.html";
  }
  </script>

  <!-- TITLE -->
  <h1 class="title">A–E Gesture Practice</h1>

  <!-- STATUS TEXT -->
  <!-- <p class="status">Select a letter to start</p> -->

  <!-- GRID WRAPPER (NEW ONLY) -->
  <div class="grid-wrapper">

    <!-- GRID -->
    <div class="grid">

      <!-- CARD -->
      <div class="card" data-letter="A" onclick="handleVideo(this)">
        <div class="image">
          <video src="../Abjad_lesson/ABJAD_VIDEO/ABJAD_A_video.mp4"></video>
          <div class="play-overlay">▶</div>
        </div>
        <p>A</p>
      </div>

      <div class="card" data-letter="B" onclick="handleVideo(this)">
        <div class="image">
          <video src="../Abjad_lesson/ABJAD_VIDEO/ABJAD_B_video.mp4"></video>
          <div class="play-overlay">▶</div>
        </div>
        <p>B</p>
      </div>

      <div class="card" data-letter="C" onclick="handleVideo(this)">
        <div class="image">
          <video src="../Abjad_lesson/ABJAD_VIDEO/ABJAD_C_video.mp4"></video>
          <div class="play-overlay">▶</div>
        </div>
        <p>C</p>
      </div>

      <div class="card" data-letter="D" onclick="handleVideo(this)">
        <div class="image">
          <video src="../Abjad_lesson/ABJAD_VIDEO/ABJAD_D_video.mp4"></video>
          <div class="play-overlay">▶</div>
        </div>
        <p>D</p>
      </div>

      <div class="card" data-letter="E" onclick="handleVideo(this)">
        <div class="image">
          <video src="../Abjad_lesson/ABJAD_VIDEO/ABJAD_E_video.mp4"></video>
          <div class="play-overlay">▶</div>
        </div>
        <p>E</p>
      </div>

    </div>
  </div>
</div>

<script>
function handleVideo(card) {
  const allVideos = document.querySelectorAll("video");
  const allCards = document.querySelectorAll(".card");
  const status = document.querySelector(".status");
  const video = card.querySelector("video");
  const letter = card.getAttribute("data-letter");

  // reset all
  allVideos.forEach(v => {
    if (v !== video) {
      v.pause();
      v.currentTime = 0;
    }
  });

  allCards.forEach(c => c.classList.remove("active"));

  if (video.paused) {
    video.play();
    card.classList.add("active");
    if (status) status.innerText = "Now practicing: " + letter;
  } else {
    video.pause();
    card.classList.remove("active");
    if (status) status.innerText = "Paused: " + letter;
  }
}
</script>

</body>
</html>
